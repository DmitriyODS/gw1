{% extends 'base.html' %}
{% block title %}Отделы — TaskTime{% endblock %}

{% block content %}
<div class="flex justify-center">
<div class="w-full max-w-lg">
  <h5 class="text-lg font-bold flex items-center gap-2 mb-4"><i class="bi bi-building"></i> Отделы</h5>

  <div class="card bg-base-100 shadow-sm mb-4">
    <div class="card-body">
      <form method="post" class="flex gap-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="name" class="input input-bordered flex-1" placeholder="Название отдела" required>
        <button type="submit" class="btn btn-primary btn-sm whitespace-nowrap">
          <i class="bi bi-plus"></i> Добавить
        </button>
      </form>
    </div>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <ul class="divide-y divide-base-300">
      {% for d in departments %}
      <li class="flex justify-between items-center px-4 py-3">
        <span>{{ d.name }}</span>
        {% if current_user.is_super_admin %}
        <form method="post" action="{{ url_for('admin.delete_department', dept_id=d.id) }}"
              onsubmit="return confirm('Удалить отдел «{{ d.name }}»?')">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-ghost btn-xs text-error"><i class="bi bi-trash"></i></button>
        </form>
        {% endif %}
      </li>
      {% else %}
      <li class="px-4 py-3 text-base-content/50 text-center text-sm">Нет отделов</li>
      {% endfor %}
    </ul>
  </div>
</div>
</div>
{% endblock %}
