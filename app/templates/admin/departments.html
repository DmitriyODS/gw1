{% extends 'base.html' %}
{% block title %}Отделы — TaskTime{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
  <h5 class="mb-3"><i class="bi bi-building"></i> Отделы</h5>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <form method="post" class="d-flex gap-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="name" class="form-control" placeholder="Название отдела" required>
        <button type="submit" class="btn btn-primary btn-sm text-nowrap">
          <i class="bi bi-plus"></i> Добавить
        </button>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <ul class="list-group list-group-flush">
      {% for d in departments %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ d.name }}
        {% if current_user.is_super_admin %}
        <form method="post" action="{{ url_for('admin.delete_department', dept_id=d.id) }}"
              onsubmit="return confirm('Удалить отдел «{{ d.name }}»?')">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
        </form>
        {% endif %}
      </li>
      {% else %}
      <li class="list-group-item text-muted text-center">Нет отделов</li>
      {% endfor %}
    </ul>
  </div>
</div>
</div>
{% endblock %}
