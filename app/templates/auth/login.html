<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Groove Work</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-neutral flex items-center justify-center min-h-screen">
<div class="w-full max-w-sm px-4">
  <div class="card bg-base-100 shadow-xl">
    <div class="card-body p-8">
      <h4 class="text-xl font-bold text-center mb-1">
        <i class="bi bi-clock-history"></i> Groove Work <span style="font-size:0.65rem; opacity:0.45; font-weight:400; vertical-align:middle">0.1</span>
      </h4>
      <p class="text-center text-base-content/60 text-sm mb-4">Система управления задачами</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      {% set ac = 'alert-error' if cat == 'danger' else 'alert-' + cat %}
      <div role="alert" class="alert {{ ac }} py-2 mb-3 text-sm">{{ msg }}</div>
      {% endfor %}
      {% endwith %}

      <form method="post" class="flex flex-col gap-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label class="label pb-1"><span class="label-text font-medium">Логин</span></label>
          <input type="text" name="username" class="input input-bordered w-full" required autofocus>
        </div>
        <div>
          <label class="label pb-1"><span class="label-text font-medium">Пароль</span></label>
          <input type="password" name="password" class="input input-bordered w-full" required>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-1">Войти</button>
      </form>

      <div class="divider my-3"></div>
      <a href="{{ url_for('public.submit') }}" class="btn btn-outline btn-sm w-full">
        Подать заявку без авторизации →
      </a>
    </div>
  </div>
</div>
</body>
</html>
