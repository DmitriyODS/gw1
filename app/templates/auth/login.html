<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Groove Work</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #cce4f7;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 0 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    /* ─── Logo pill ─── */
    .logo-pill {
      background: #2563eb;
      border-radius: 999px;
      padding: 10px 24px;
      display: inline-flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 24px rgba(37,99,235,0.35);
      margin-bottom: -18px;
      position: relative; z-index: 2;
    }
    .logo-pill img { width: 28px; height: 28px; object-fit: contain; }
    .logo-pill span {
      color: #fff; font-size: 1rem; font-weight: 800;
      letter-spacing: 0.04em; white-space: nowrap;
    }
    /* ─── Card ─── */
    .card {
      width: 100%;
      background: #fff;
      border-radius: 22px;
      padding: 44px 36px 32px;
      box-shadow: 0 8px 40px rgba(30,60,120,0.13);
    }
    h2 {
      font-size: 1.25rem; font-weight: 700; color: #334155;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: #64748b; text-transform: lowercase; letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 18px;
      border: 1.5px solid #cbd5e1; border-radius: 999px;
      font-size: 0.9rem; color: #334155; outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    .field input:focus { border-color: #3b82f6; }
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #4f90ea 0%, #3b82f6 100%);
      color: #fff; border: none; border-radius: 999px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.02em; margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .submit-link {
      text-align: center; margin-top: 20px;
    }
    .submit-link a {
      font-size: 0.85rem; color: #64748b; font-weight: 600;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .submit-link a:hover { color: #3b82f6; }
    .flash-error {
      background: #fee2e2; color: #dc2626;
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
    .flash-warning {
      background: #fef3c7; color: #b45309;
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-pill">
    <img src="/static/logo.svg" alt="Groove Work">
    <span>Groove&nbsp;Work</span>
  </div>

  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="flash-{{ 'error' if cat in ('danger','error') else 'warning' }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <h2>Авторизация</h2>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>логин</label>
        <input type="text" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label>пароль</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Войти</button>
    </form>

    <div class="submit-link">
      <a href="{{ url_for('public.submit') }}">Подать заявку</a>
    </div>
  </div>

</div>
</body>
</html>
