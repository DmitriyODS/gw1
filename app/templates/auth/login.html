<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Groove Work</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <style>
    :root {
      --login-bg:        #cce4f7;
      --login-primary:   #2563eb;
      --login-primary-2: #3b82f6;
      --login-primary-3: #4f90ea;
      --login-surface:   #ffffff;
      --login-text:      #334155;
      --login-muted:     #64748b;
      --login-border:    #cbd5e1;
      --login-error-bg:  #fee2e2;
      --login-error:     #dc2626;
      --login-warn-bg:   #fef3c7;
      --login-warn:      #b45309;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--login-bg);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 0 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    /* ─── Logo pill ─── */
    .logo-pill {
      background: var(--login-primary);
      border-radius: 999px;
      padding: 10px 24px;
      display: inline-flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 24px color-mix(in srgb, var(--login-primary) 35%, transparent);
      margin-bottom: -18px;
      position: relative; z-index: 2;
    }
    .logo-pill img { width: 28px; height: 28px; object-fit: contain; }
    .logo-pill span {
      color: var(--login-surface); font-size: 1rem; font-weight: 800;
      letter-spacing: 0.04em; white-space: nowrap;
    }
    /* ─── Card ─── */
    .card {
      width: 100%;
      background: var(--login-surface);
      border-radius: 22px;
      padding: 44px 36px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    }
    h2 {
      font-size: 1.25rem; font-weight: 700; color: var(--login-text);
      margin-bottom: 24px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--login-muted); text-transform: lowercase; letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 18px;
      border: 1.5px solid var(--login-border); border-radius: 999px;
      font-size: 0.9rem; color: var(--login-text); outline: none;
      transition: border-color 0.15s;
      background: var(--login-surface);
    }
    .field input:focus { border-color: var(--login-primary-2); }
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--login-primary-3) 0%, var(--login-primary-2) 100%);
      color: var(--login-surface); border: none; border-radius: 999px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.02em; margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--login-primary-2) 30%, transparent);
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .submit-link {
      text-align: center; margin-top: 20px;
    }
    .submit-link a {
      font-size: 0.85rem; color: var(--login-muted); font-weight: 600;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .submit-link a:hover { color: var(--login-primary-2); }
    .flash-error {
      background: var(--login-error-bg); color: var(--login-error);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
    .flash-warning {
      background: var(--login-warn-bg); color: var(--login-warn);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-pill">
    <img src="/static/logo.svg" alt="Groove Work">
    <span>Groove&nbsp;Work</span>
  </div>

  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="flash-{{ 'error' if cat in ('danger','error') else 'warning' }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <h2>Авторизация</h2>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>логин</label>
        <input type="text" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label>пароль</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Войти</button>
    </form>

    <div class="submit-link">
      <a href="{{ url_for('public.submit') }}">Подать заявку</a>
    </div>
  </div>

</div>
</body>
</html>
