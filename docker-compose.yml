# DEV: только база в докере.
# init.sql выполняется автоматически при первом создании volume.
# Бэк и фронт запускаются вручную:
#   backend: cd backend && go run ./cmd/api
#   frontend: cd frontend && npm run dev

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasktime
      POSTGRES_USER: tasktime
      POSTGRES_PASSWORD: tasktime
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql выполняется один раз при первом старте (пустой volume)
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktime -d tasktime"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
