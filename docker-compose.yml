services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasktime
      POSTGRES_USER: tasktime
      POSTGRES_PASSWORD: tasktime
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./app
    command: flask run --host=0.0.0.0 --port=5001 --debug
    volumes:
      - ./app:/app
      - uploads:/app/uploads
    ports:
      - "5001:5001"
    environment:
      FLASK_APP: factory:create_app
      FLASK_ENV: development
      DATABASE_URL: postgresql://tasktime:tasktime@db:5432/tasktime
      SECRET_KEY: dev-secret-key
      UPLOAD_FOLDER: /app/uploads
    depends_on:
      - db

  daemon_rhythms:
    build: ./app
    command: python daemon_rhythms.py
    volumes:
      - ./app:/app
      - uploads:/app/uploads
    environment:
      FLASK_APP: factory:create_app
      DATABASE_URL: postgresql://tasktime:tasktime@db:5432/tasktime
      SECRET_KEY: dev-secret-key
      UPLOAD_FOLDER: /app/uploads
    depends_on:
      - db
    restart: unless-stopped

  daemon_archive:
    build: ./app
    command: python daemon_archive.py
    volumes:
      - ./app:/app
      - uploads:/app/uploads
    environment:
      FLASK_APP: factory:create_app
      DATABASE_URL: postgresql://tasktime:tasktime@db:5432/tasktime
      SECRET_KEY: dev-secret-key
      UPLOAD_FOLDER: /app/uploads
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
