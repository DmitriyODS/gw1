server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── SPA static files ────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy: Go backend (API + file endpoints) ─────────────────────────────
    # Все эти пути уходят напрямую в backend:8080 через внутреннюю сеть Docker.
    location ~ ^/(api|public|uploads|avatars)(/|$) {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Для загрузки файлов — отключаем буферизацию
        proxy_request_buffering off;
    }

    # ── SPA fallback: всё остальное → index.html ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Кеширование статики ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
